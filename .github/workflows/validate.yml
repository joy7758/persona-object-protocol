name: POP Validation

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate-plugin-config:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config_file:
          - plugin_config.example.json
          - plugin_config.packages.example.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install POP CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[schema]"

      - name: Validate plugin config example
        run: |
          python validation/scripts/validate_plugin_config.py "${{ matrix.config_file }}"

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install POP CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[schema]"

      - name: Validate all example POP objects
        run: |
          for f in examples/*.json; do
            echo "Validating $f"
            pop validate "$f"
          done

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pop-dist
          path: dist/*
