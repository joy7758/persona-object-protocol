# This workflow requires a PyPI Trusted Publisher configuration to succeed.
# Until the publisher is configured on PyPI, workflow_dispatch failures are expected.
name: PyPI Publish

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev and schema extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,schema]"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: Build distributions
        run: |
          python -m build

      - name: Run twine check
        run: |
          python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pop-pypi-dist
          path: dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pop-pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
