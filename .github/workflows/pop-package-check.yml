name: POP Package Check

on:
  push:
    paths:
      - "pyproject.toml"
      - "src/**"
      - "README.md"
      - "CHANGELOG.md"
      - "schema/**"
      - "fixtures/**"
      - "tests/**"
      - ".github/workflows/pop-package-check.yml"
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/**"
      - "README.md"
      - "CHANGELOG.md"
      - "schema/**"
      - "fixtures/**"
      - "tests/**"
      - ".github/workflows/pop-package-check.yml"
  workflow_dispatch:

jobs:
  package-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev and schema extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,schema]"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: Build distributions
        run: |
          python -m build

      - name: Run twine check
        run: |
          python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pop-dist-${{ matrix.python-version }}
          path: dist/*
