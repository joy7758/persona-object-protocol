<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="940" viewBox="0 0 1400 940" role="img" aria-labelledby="title desc">
  <title id="title">POP Persona Layer Diagram</title>
  <desc id="desc">POP treats persona as a portable object layer for agent runtimes. Framework configs are derived projections.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#24292f"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #24292f; stroke-width: 2.5; rx: 18; ry: 18; }
      .note { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 2; rx: 18; ry: 18; }
      .label { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .small { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 500; text-anchor: middle; }
      .body { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 24px; text-anchor: middle; }
      .line { stroke: #24292f; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="940"/>

  <rect class="box" x="500" y="70" width="400" height="88"/>
  <text class="label" x="700" y="114">Persona Ref</text>

  <path class="line" d="M700 158 L700 214"/>

  <rect class="box" x="455" y="214" width="490" height="92"/>
  <text class="label" x="700" y="260">POP Persona Object</text>

  <rect class="note" x="195" y="212" width="210" height="96"/>
  <text class="body" x="300" y="252">Protocol</text>
  <text class="body" x="300" y="286">Core</text>
  <path class="line" d="M405 260 L445 260"/>

  <path class="line" d="M700 306 L700 362"/>

  <rect class="box" x="465" y="362" width="470" height="92"/>
  <text class="label" x="700" y="408">Resolve / Validate</text>

  <path class="line" d="M700 454 L700 510"/>

  <rect class="box" x="455" y="510" width="490" height="92"/>
  <text class="label" x="700" y="556">Runtime Projection</text>

  <rect class="note" x="995" y="508" width="210" height="96"/>
  <text class="body" x="1100" y="548">Derived</text>
  <text class="body" x="1100" y="582">Projections</text>
  <path class="line" d="M955 556 L995 556"/>

  <path class="line" d="M700 602 L700 658"/>

  <path class="line" d="M700 658 L320 658 L320 704"/>
  <path class="line" d="M700 658 L700 704"/>
  <path class="line" d="M700 658 L1080 658 L1080 704"/>

  <rect class="box" x="145" y="704" width="350" height="88"/>
  <text class="label" x="320" y="748">CrewAI</text>

  <rect class="box" x="525" y="704" width="350" height="88"/>
  <text class="label" x="700" y="748">LangChain</text>

  <rect class="box" x="905" y="704" width="350" height="88"/>
  <text class="label" x="1080" y="748">AutoGen</text>

  <rect class="note" x="180" y="820" width="1040" height="84"/>
  <text class="small" x="700" y="855">POP treats persona as a portable object layer for agent runtimes.</text>
  <text class="small" x="700" y="888">Framework configs are derived projections.</text>
</svg>
